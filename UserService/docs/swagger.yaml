definitions:
  types.UpdateUserDto:
    properties:
      email:
        type: string
      id:
        type: string
      name:
        type: string
      role:
        type: string
    type: object
  types.User:
    properties:
      email:
        type: string
      id:
        type: string
      name:
        type: string
      password:
        type: string
      role:
        type: string
      wallet:
        type: integer
    type: object
  types.UserCredentials:
    properties:
      email:
        type: string
      password:
        type: string
    type: object
info:
  contact: {}
paths:
  /user-service/:
    delete:
      consumes:
      - application/json
      description: delete user
      parameters:
      - description: Some ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: string
      tags:
      - user-service
    get:
      consumes:
      - application/json
      description: description of function that get user by id
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: string
      tags:
      - user-service
    patch:
      consumes:
      - application/json
      description: update user
      parameters:
      - description: User data
        in: body
        name: user
        required: true
        schema:
          $ref: '#/definitions/types.UpdateUserDto'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: string
      tags:
      - user-service
    put:
      consumes:
      - application/json
      description: user registaration
      parameters:
      - description: User data
        in: body
        name: user
        required: true
        schema:
          $ref: '#/definitions/types.User'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: string
      tags:
      - user-service
  /user-service/get-all:
    get:
      consumes:
      - application/json
      description: description of function that get all users from DB
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: string
      summary: GetAll
      tags:
      - user-service
  /user-service/login:
    post:
      consumes:
      - application/json
      description: add money
      parameters:
      - description: User data
        in: body
        name: credentials
        required: true
        schema:
          $ref: '#/definitions/types.UserCredentials'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: string
      tags:
      - auth
  /user-service/spend-money:
    post:
      consumes:
      - application/json
      description: spend money
      parameters:
      - description: Some money
        in: query
        name: money
        type: integer
      responses:
        "200":
          description: OK
          schema:
            type: string
      tags:
      - user-service
  /user-service/test:
    get:
      consumes:
      - application/json
      description: do ping
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: string
      summary: ping example
      tags:
      - user-service
  /user-service/wallet-replenishment:
    post:
      consumes:
      - application/json
      description: add money
      parameters:
      - description: Some money
        in: query
        name: money
        type: integer
      responses:
        "200":
          description: OK
          schema:
            type: string
      tags:
      - user-service
swagger: "2.0"
