info:
  contact: {}
paths:
  /user-service/:
    patch:
      consumes:
      - application/json
      description: update user
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: string
      tags:
      - user-service
    put:
      consumes:
      - application/json
      description: add user
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: string
      tags:
      - user-service
  /user-service/{id}:
    delete:
      consumes:
      - application/json
      description: delete user
      parameters:
      - description: Some ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: string
      tags:
      - user-service
    get:
      consumes:
      - application/json
      description: description of function that get user by id
      parameters:
      - description: Some ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: string
      tags:
      - user-service
  /user-service/get-all:
    get:
      consumes:
      - application/json
      description: description of function that get all users from DB
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: string
      summary: GetAll
      tags:
      - user-service
  /user-service/spend-money:
    post:
      consumes:
      - application/json
      description: spend money
      parameters:
      - description: Some ID
        in: query
        name: id
        type: string
      - description: Some money
        in: query
        name: money
        type: integer
      responses:
        "200":
          description: OK
          schema:
            type: string
      tags:
      - user-service
  /user-service/test:
    get:
      consumes:
      - application/json
      description: do ping
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: string
      summary: ping example
      tags:
      - user-service
  /user-service/wallet-replenishment:
    post:
      consumes:
      - application/json
      description: add money
      parameters:
      - description: Some ID
        in: query
        name: id
        type: string
      - description: Some money
        in: query
        name: money
        type: integer
      responses:
        "200":
          description: OK
          schema:
            type: string
      tags:
      - user-service
swagger: "2.0"
